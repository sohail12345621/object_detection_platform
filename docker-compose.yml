version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./weights:/app/weights
      - ./data:/app/data
    environment:
      - PROJECT_NAME=AI Object Detection & Tracking Platform
      - UPLOAD_DIR=/app/uploads
      - OUTPUT_DIR=/app/outputs
      - WEIGHTS_DIR=/app/weights
      - DATABASE_URL=sqlite:////app/data/sql_app.db

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8501:8501"
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
    environment:
      - API_URL=http://backend:8000/api/v1
    depends_on:
      - backend
